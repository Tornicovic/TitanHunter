<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cazador de Titanes</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===================== -->
<!-- MENÚ PRINCIPAL -->
<!-- ===================== -->

<div id="menu">

<h1>CAZADOR DE TITANES</h1>

<p>La humanidad necesita un nuevo héroe.</p>

<button id="playBtn">
JUGAR
</button>

</div>

<!-- ===================== -->
<!-- CREAR PERSONAJE -->
<!-- ===================== -->

<div id="creator" style="display:none;">

<h2>CREA TU CAZADOR</h2>

<input
id="playerName"
type="text"
placeholder="Escribe tu nombre">

<button id="startGame">
COMENZAR
</button>

</div>

<!-- ===================== -->
<!-- JUEGO -->
<!-- ===================== -->

<div id="game" style="display:none;">

<!-- JUGADOR -->

<div id="playerBox">

<h2 id="name">
Jugador
</h2>

<p>
❤️ Vida:
<span id="life">100</span>/100
</p>

<p>
⚔ Ataque:
<span id="attack">20</span>
</p>

<p>
🛡 Defensa:
<span id="defense">10</span>
</p>

</div>

<hr>

<!-- ENEMIGO -->

<div id="enemy">

<h2 id="enemyName">
Sin enemigo
</h2>

<p>
❤️ Vida:
<span id="enemyLife">0</span>/100
</p>

</div>

<hr>

<!-- MENSAJES -->

<div id="battleLog">

Pulsa "Buscar Titán" para comenzar.

</div>

<br>

<!-- BOTONES -->

<div id="actions">

<button id="huntBtn">
BUSCAR TITÁN
</button>

<button id="attackBtn" disabled>
ATACAR
</button>

<button id="healBtn" disabled>
RECUPERAR
</button>

</div>

</div>

<script src="game.js"></script>

</body>

</html>
